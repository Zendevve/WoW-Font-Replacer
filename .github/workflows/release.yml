name: Build and Release

on:
  push:
    tags:
      - 'v*' # Triggers the build when you push a tag like v1.0, v1.0.0, etc.

permissions:
  contents: write # Required to upload assets to releases

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Download Readability Fonts
      run: |
        python download_fonts.py

    - name: Compile Standalone Executable
      run: |
        python build.py

    - name: Create Release and Upload Asset
      uses: softprops/action-gh-release@v2
      with:
        files: dist/WoWFontReplacer.exe
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
